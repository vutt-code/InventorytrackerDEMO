name: "Infrastructure Teardown (Terraform Destroy)"

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Are you sure you want to destroy ALL infrastructure? This is IRREVERSIBLE. Type 'DESTROY' to confirm."
        required: true
        type: string

jobs:
  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ./terraform
    env:
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_auth_secret: ${{ secrets.AUTH_SECRET }}
      TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
      TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      TF_VAR_initial_allowed_emails: ${{ secrets.INITIAL_ALLOWED_EMAILS }}
      TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      TF_VAR_domain_name: ${{ secrets.DOMAIN_NAME }}
      TF_VAR_auth_url: ${{ secrets.AUTH_URL }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "ERROR: Confirmation 'DESTROY' not provided. Exiting to prevent accidental teardown."
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GH_ROLE_ARN }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
